  codeql:
    # Using digest for reproducibility (equivalent to latest as of 2026-01-23)
    # To update: docker pull mcr.microsoft.com/cstsectools/codeql-container:latest
    # and get new digest with: docker inspect mcr.microsoft.com/cstsectools/codeql-container:latest
    build:
      context: .
      dockerfile: docker/codeql/Dockerfile
    container_name: codeql-executor
    env_file:
      - docker/common/python.env
    user: "1000:1000"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - mcpwner-internal
      - mcpwner-recon   # internet: autobuild needs to resolve build dependencies
    environment:
      # With internet available, let CodeQL install dependencies for richer analysis 
      - CODEQL_EXTRACTOR_JAVASCRIPT_OPTION_INSTALL_DEPENDENCIES=true
      - LGTM_INDEX_INSTALL_DEPENDENCIES=true
    read_only: false  # autobuild writes build artifacts / dependency caches
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4.0"
        reservations:
          memory: 1g
    volumes:
      - workspaces:/workspaces
      # Local directory mounts can be added dynamically:
      # - /path/to/local/dir:/workspaces/{workspace_id}/source:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=2g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8080/health\")"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s

    profiles:
      - codeql
      - sast
  linguist:
    build:
      context: .
      dockerfile: docker/linguist/Dockerfile
    container_name: linguist-detector
    env_file:
      - docker/common/python.env
    # Run as UID 1000 to match the owner of cloned workspaces, otherwise
    # libgit2/Rugged rejects the repo ("not owned by current user").
    user: "1000:1000"
    read_only: false
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - workspaces:/workspaces:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    networks:
      - mcpwner-internal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8081/health\")"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  semgrep:

    build:
      context: .
      dockerfile: docker/sast/semgrep/Dockerfile
    container_name: semgrep-scanner
    env_file:
      - docker/common/python.env
    environment:
      # Internet available: use the curated Semgrep Registry ruleset ('auto')
      # instead of the bundled offline copy. 'auto' requires metrics to be
      # enabled (it queries the registry), so override the image's off default.
      - SEMGREP_DEFAULT_CONFIG=auto
      - SEMGREP_SEND_METRICS=auto
      # This container runs as root, but GitHub clones are owned by UID 1000 (the
      # server that cloned them). Git rejects such repos ("dubious ownership"), so
      # `git ls-files` returns nothing — and semgrep discovers its scan targets via
      # git, meaning it would scan 0 files and report 0 findings on every cloned
      # repo regardless of language. Tell git to trust any repo path.
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - "GIT_CONFIG_VALUE_0=*"
    read_only: false
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
    volumes:
      - workspaces:/workspaces
    tmpfs:
      - /tmp:noexec,nosuid,size=1g
    networks:
      - mcpwner-internal
      - mcpwner-recon   # internet: fetch rules from the Semgrep Registry
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8082/health\")"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

    profiles:
      - semgrep
      - sast
