# TODO: there are some problems here like running as root in the container, will need to add security hardening

services:
  mcpwner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mcpwner-server
    user: "0:0"
    stdin_open: true
    tty: true
    read_only: false
    # cap_drop:
    #   - ALL
    # security_opt:
    #   - no-new-privileges:true
    ports:
      - "13370:13370"
    volumes:
      - workspaces:/workspaces
      - logs:/var/log/mcpwner
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./src:/app/src
      # Local directory mounts
      # Map your host's development directory to /mnt/host inside the container
      # This allows you to scan local projects by referring to them as /mnt/host/my-project
      # - ${HOME}/Documents:/mnt/host:ro
      # - C:\Users:/mnt/users:ro (Windows example)
    tmpfs:
      - /tmp:noexec,nosuid,size=1g
    networks:
      - mcpwner-internal
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-stdio}
      - CODEQL_SERVICE_URL=http://codeql:8080
      - LINGUIST_SERVICE_URL=http://linguist:8081
      - SEMGREP_SERVICE_URL=http://semgrep:8082
      - BANDIT_SERVICE_URL=http://bandit:8083
      - GOSEC_SERVICE_URL=http://gosec:8084
      - BRAKEMAN_SERVICE_URL=http://brakeman:8085
      - PMD_SERVICE_URL=http://pmd:8086
      - PSALM_SERVICE_URL=http://psalm:8087
    depends_on:
      - codeql
      - linguist
      - semgrep
      - bandit
      - gosec
      - brakeman
      - pmd
      - psalm

  codeql:
    # Using digest for reproducibility (equivalent to latest as of 2026-01-23)
    # To update: docker pull mcr.microsoft.com/cstsectools/codeql-container:latest
    # and get new digest with: docker inspect mcr.microsoft.com/cstsectools/codeql-container:latest
    build:
      context: .
      dockerfile: docker/codeql/Dockerfile
    container_name: codeql-executor
    user: "0:0"  # Run as root for package installation and service
    ports:
      - "8080:8080"
    networks:
      - mcpwner-internal
    environment:
      - CODEQL_EXTRACTOR_JAVASCRIPT_OPTION_INSTALL_DEPENDENCIES=false
      - LGTM_INDEX_INSTALL_DEPENDENCIES=false
    read_only: false
    # cap_drop:
    #   - ALL
    # security_opt:
    #   - no-new-privileges:true
    volumes:
      - workspaces:/workspaces
      - ./docker/codeql_service.py:/service/codeql_service.py
      # Local directory mounts can be added dynamically:
      # - /path/to/local/dir:/workspaces/{workspace_id}/source:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  linguist:
    build:
      context: .
      dockerfile: docker/linguist/Dockerfile
    container_name: linguist-detector
    user: "0:0"  # Run as root for linguist execution
    read_only: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "8081:8081"
    volumes:
      - workspaces:/workspaces:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    networks:
      - mcpwner-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  semgrep:
    build:
      context: .
      dockerfile: docker/semgrep/Dockerfile
    container_name: semgrep-scanner
    user: "0:0"  # Run as root for semgrep execution
    read_only: false
    cap_drop:
      - ALL
    security_opt:
