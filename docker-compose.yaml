    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  workspaces:
    driver: local
  logs:
    driver: local

networks:
  mcpwner-internal:
    driver: bridge
    internal: false
