services:
  # One-shot: ensure shared volumes are owned by mcpwner (UID 1000) and writable.
  volume-init:
    image: alpine:3.19
    user: "0:0"
    volumes:
      - workspaces:/workspaces
      - logs:/var/log/mcpwner
    command:
      - sh
      - -ec
      - |
        mkdir -p /workspaces/.metadata /var/log/mcpwner
        chown -R 1000:1000 /workspaces /var/log/mcpwner
        chmod 1777 /workspaces
    restart: "no"

  mcpwner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mcpwner-server
    env_file:
      - docker/common/python.env
    user: "1000:1000"
    stdin_open: true
    tty: true
    read_only: true
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "13370:13370"
    volumes:
      - workspaces:/workspaces
      - logs:/var/log/mcpwner
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./src:/app/src:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=1g
      - /app/cache:noexec,nosuid,size=512m
    networks:
      - mcpwner-internal
      - mcpwner-recon
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-stdio}
    depends_on:
      volume-init:
        condition: service_completed_successfully
      codeql:
        condition: service_healthy
      linguist:
        condition: service_healthy
      bandit:
        condition: service_healthy
      gosec:
        condition: service_healthy
      brakeman:
        condition: service_healthy
      pmd:
        condition: service_healthy
      psalm:
        condition: service_healthy
      nodejsscan:
        condition: service_healthy
      joern:
        condition: service_healthy
      yasa:
        condition: service_healthy
      opengrep:
        condition: service_healthy
      gitleaks:
        condition: service_healthy
      trufflehog:
        condition: service_healthy
      whispers:
        condition: service_healthy
      detect-secrets:
        condition: service_healthy
      hawk-scanner:
        condition: service_healthy
      osv-scanner:
        condition: service_healthy
      grype:
        condition: service_healthy
      syft:
        condition: service_healthy
      retirejs:
        condition: service_healthy
      subfinder:
        condition: service_healthy
      amass:
        condition: service_healthy
      masscan:
        condition: service_healthy
      nmap:
        condition: service_healthy
      ffuf:
        condition: service_healthy
      bbot:
        condition: service_healthy
      httpx:
        condition: service_healthy
      katana:
        condition: service_healthy
      gau:
        condition: service_healthy
      arjun:
        condition: service_healthy
      wafw00f:
        condition: service_healthy
      kiterunner:
        condition: service_healthy

  codeql:
    # Using digest for reproducibility (equivalent to latest as of 2026-01-23)
    # To update: docker pull mcr.microsoft.com/cstsectools/codeql-container:latest
    # and get new digest with: docker inspect mcr.microsoft.com/cstsectools/codeql-container:latest
    build:
      context: .
      dockerfile: docker/codeql/Dockerfile
    container_name: codeql-executor
    env_file:
      - docker/common/python.env
    user: "1000:1000"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - mcpwner-internal
    environment:
      - CODEQL_EXTRACTOR_JAVASCRIPT_OPTION_INSTALL_DEPENDENCIES=false
      - LGTM_INDEX_INSTALL_DEPENDENCIES=false
    read_only: true
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4.0"
        reservations:
          memory: 1g
    volumes:
      - workspaces:/workspaces
      - ./docker/codeql_service.py:/service/codeql_service.py:ro
      # Local directory mounts can be added dynamically:
      # - /path/to/local/dir:/workspaces/{workspace_id}/source:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=2g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8080/health\")"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s

  linguist:
    build:
      context: .
      dockerfile: docker/linguist/Dockerfile
    container_name: linguist-detector
    env_file:
      - docker/common/python.env
    # Run as UID 1000 to match the owner of cloned workspaces, otherwise
    # libgit2/Rugged rejects the repo ("not owned by current user").
    user: "1000:1000"
    read_only: false
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - workspaces:/workspaces:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    networks:
      - mcpwner-internal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8081/health\")"]
