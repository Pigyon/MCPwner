      - /tmp:noexec,nosuid,size=1g
    networks:
      - mcpwner-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  gosec:
