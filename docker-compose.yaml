# TODO: there are some problems here like running as root in the container, will need to add security hardening

services:
  mcpwner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mcpwner-server
    user: "0:0"
    stdin_open: true
    tty: true
    read_only: false
    # cap_drop:
    #   - ALL
    # security_opt:
    #   - no-new-privileges:true
    ports:
      - "13370:13370"
    volumes:
      - workspaces:/workspaces
      - logs:/var/log/mcpwner
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./src:/app/src
      # Local directory mounts
      # Map your host's development directory to /mnt/host inside the container
      # This allows you to scan local projects by referring to them as /mnt/host/my-project
      # - ${HOME}/Documents:/mnt/host:ro
      # - C:\Users:/mnt/users:ro (Windows example)
    tmpfs:
      - /tmp:noexec,nosuid,size=1g
    networks:
      - mcpwner-internal
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-stdio}
      - CODEQL_SERVICE_URL=http://codeql:8080
      - LINGUIST_SERVICE_URL=http://linguist:8081
      - SEMGREP_SERVICE_URL=http://semgrep:8082
      - BANDIT_SERVICE_URL=http://bandit:8083
      - GOSEC_SERVICE_URL=http://gosec:8084
      - BRAKEMAN_SERVICE_URL=http://brakeman:8085
      - PMD_SERVICE_URL=http://pmd:8086
      - PSALM_SERVICE_URL=http://psalm:8087
      - NODEJSSCAN_SERVICE_URL=http://nodejsscan:8088
      - JOERN_SERVICE_URL=http://joern:8089
      - YASA_SERVICE_URL=http://yasa:8095
      - OPENGREP_SERVICE_URL=http://opengrep:8096
      - WHISPERS_SERVICE_URL=http://whispers:8092
      - DETECT_SECRETS_SERVICE_URL=http://detect-secrets:8093
      - HAWK_SCANNER_SERVICE_URL=http://hawk-scanner:8094
      - OSV_SCANNER_SERVICE_URL=http://osv-scanner:8100
      - GRYPE_SERVICE_URL=http://grype:8101
      - SYFT_SERVICE_URL=http://syft:8102
      - RETIREJS_SERVICE_URL=http://retirejs:8104
      - SUBFINDER_SERVICE_URL=http://subfinder:8110
      - AMASS_SERVICE_URL=http://amass:8111
      - MASSCAN_SERVICE_URL=http://masscan:8117
      - NMAP_SERVICE_URL=http://nmap:8116
      - FFUF_SERVICE_URL=http://ffuf:8114
      - BBOT_SERVICE_URL=http://bbot:8118
      - HTTPX_SERVICE_URL=http://httpx:8112
      - KATANA_SERVICE_URL=http://katana:8113
      - ARJUN_SERVICE_URL=http://arjun:8119
      - GAU_SERVICE_URL=http://gau:8115
      - WAFW00F_SERVICE_URL=http://wafw00f:8120
      - KITERUNNER_SERVICE_URL=http://kiterunner:8121
    depends_on:
      - codeql
      - linguist
      - semgrep
      - bandit
      - gosec
      - brakeman
      - pmd
      - psalm
      - nodejsscan
      - joern
      - yasa
      - opengrep
      - whispers
      - detect-secrets
      - hawk-scanner
      - osv-scanner
      - grype
      - syft
      - retirejs
      - subfinder
      - amass
      - masscan
      - nmap
      - ffuf
      - bbot
      - httpx
      - katana
      - gau
      - arjun
      - wafw00f
      - kiterunner

  codeql:
    # Using digest for reproducibility (equivalent to latest as of 2026-01-23)
    # To update: docker pull mcr.microsoft.com/cstsectools/codeql-container:latest
    # and get new digest with: docker inspect mcr.microsoft.com/cstsectools/codeql-container:latest
    build:
      context: .
      dockerfile: docker/codeql/Dockerfile
    container_name: codeql-executor
    user: "0:0"  # Run as root for package installation and service
    ports:
      - "8080:8080"
    networks:
      - mcpwner-internal
    environment:
      - CODEQL_EXTRACTOR_JAVASCRIPT_OPTION_INSTALL_DEPENDENCIES=false
      - LGTM_INDEX_INSTALL_DEPENDENCIES=false
    read_only: false
    # cap_drop:
    #   - ALL
    # security_opt:
    #   - no-new-privileges:true
    volumes:
      - workspaces:/workspaces
      - ./docker/codeql_service.py:/service/codeql_service.py
      # Local directory mounts can be added dynamically:
      # - /path/to/local/dir:/workspaces/{workspace_id}/source:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

