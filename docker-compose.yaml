    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  brakeman:
    build:
      context: .
      dockerfile: docker/brakeman/Dockerfile
    container_name: brakeman-scanner
    user: "0:0"  # Run as root for brakeman execution
