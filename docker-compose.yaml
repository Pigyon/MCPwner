services:
  # One-shot: ensure shared volumes are owned by mcpwner (UID 1000) and writable.
  volume-init:
    image: alpine:3.19
    user: "0:0"
    volumes:
      - workspaces:/workspaces
      - logs:/var/log/mcpwner
    command:
      - sh
      - -ec
      - |
        mkdir -p /workspaces/.metadata /var/log/mcpwner
        chown -R 1000:1000 /workspaces /var/log/mcpwner
        chmod 1777 /workspaces
    restart: "no"
  mcpwner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mcpwner-server
    env_file:
      - docker/common/python.env
    user: "1000:1000"
    stdin_open: true
    tty: true
    read_only: true
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - workspaces:/workspaces
      - logs:/var/log/mcpwner
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./src:/app/src:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=1g
      - /app/cache:noexec,nosuid,size=512m
    networks:
      - mcpwner-internal
      - mcpwner-recon
    depends_on:
      volume-init:
        condition: service_completed_successfully
        required: false
      codeql:
        condition: service_healthy
        required: false
      linguist:
        condition: service_healthy
      bandit:
        condition: service_healthy
        required: false
      gosec:
        condition: service_healthy
        required: false
