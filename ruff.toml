# Ruff configuration for linting and formatting
# This allows your editor to show issues in real-time

# Line length
line-length = 105

[lint]
# Enable the same rules as pre-commit
select = [
    "SIM",  # flake8-simplify: Simplify code patterns
    "RET",  # flake8-return: Enforce consistent return statements
    "C4",   # flake8-comprehensions: Improve comprehensions
    "PTH",  # flake8-use-pathlib: Prefer pathlib over os.path
    "S",    # bandit: Security issue detection
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
]

# Ignore specific rules if needed
ignore = [
    "S101",  # Allow assert statements (common in tests)
    "S104",  # Allow binding to all interfaces (0.0.0.0 needed for Docker)
    "S108",  # Allow /tmp/ usage (acceptable for temporary files)
    "S603",  # Allow subprocess calls (needed for CodeQL, Semgrep, etc.)
    "S607",  # Allow partial executable paths (codeql, semgrep are in PATH)
    "S110",  # Allow try-except-pass (sometimes appropriate)
    "S113",  # Allow requests without timeout in tests
    "PTH",   # Allow os.path usage (pathlib migration can be done later)
    "RET504", # Allow unnecessary assignment before return (can be clearer)
    "SIM117", # Allow nested with statements (sometimes clearer)
    "F841",  # Allow unused variables (validation calls may be intentional)
    "W291",  # Allow trailing whitespace (in multi-line strings/SQL)
]

# Auto-fix when possible
fixable = ["ALL"]

[lint.per-file-ignores]
# Allow assert and other test-specific patterns in test files
"tests/**/*.py" = ["S101", "S105", "S106"]

[format]
# Use double quotes for strings
quote-style = "double"

# Indent with 4 spaces
indent-style = "space"

[lint.isort]
# Group imports properly
known-first-party = ["src"]
