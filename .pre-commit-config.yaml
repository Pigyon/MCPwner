repos:
  # Code Quality - Run on COMMIT
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      # Verify formatting only — editor format-on-save applies fixes (see .vscode/settings.json)
      - id: ruff-format
        name: Format code with ruff
        args: [--check]
        exclude: '^\.vulture_whitelist\.py$'
        stages: [pre-commit]

      # Lint check only — fixes are applied on save or via `ruff check --fix` before commit
      - id: ruff
        name: Run ruff linter
        exclude: '^\.vulture_whitelist\.py$'
        stages: [pre-commit]

  # Dead Code Detection - Run on COMMIT (BLOCKS if found)
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        name: Find dead code with vulture (STRICT)
        args:
          - 'src/'
          - '.vulture_whitelist.py'
          - '--min-confidence=80'
          - '--exclude=tests/'
        stages: [pre-commit]
        # BLOCKS commit if dead code found - add to whitelist if intentional
