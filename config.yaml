# MCPwner Configuration Example
# Copy this file to config.yaml and adjust settings as needed

# MCP Transport Configuration
transport:
  # Transport type: stdio (default) or sse
  # stdio: For local usage with Claude Desktop, Cline, etc.
  #        Containers spawn on-demand via docker run
  # sse:   For deployed/remote usage with web clients
  #        Runs persistent HTTP server
  type: "stdio"

# Server settings
server:
  # Port for MCP SSE transport
  port: 13370
  # Host to bind to (0.0.0.0 for all interfaces)
  host: "0.0.0.0"

# CodeQL Service
codeql:
  # CodeQL service URL (internal Docker network)
  service_url: "http://codeql:8080"

# Workspace settings
workspace:
  # Base directory for all workspaces
  base_path: "/workspaces"
  # Maximum number of concurrent workspaces
  max_workspaces: 10
  # Auto-cleanup workspaces after this many seconds (0 = disabled)
  auto_cleanup_seconds: 3600

# Resource limits
resources:
  # Maximum disk space per workspace in MB
  max_disk_mb: 5000
  # Maximum memory for CodeQL operations in MB
  max_memory_mb: 4096
  # Maximum CPU cores for CodeQL operations
  max_cpu_cores: 2

# Timeouts (in seconds)
timeouts:
  # Maximum time for database creation
  database_creation: 600
  # Maximum time for query execution
  query_execution: 300
  # Maximum time for workspace creation
  workspace_creation: 120

# Rate limits
rate_limits:
  # Maximum queries per workspace per minute
  queries_per_minute: 10
  # Maximum database creations per hour
  databases_per_hour: 20

# Security settings
security:
  # Allow custom queries (if false, only builtin queries allowed)
  allow_custom_queries: true
  # Allowed source types for workspace creation
  allowed_source_types:
    - "github"
    - "local"
  # GitHub rate limit (requests per hour, 0 = unlimited)
  github_rate_limit: 60

# Logging
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"
  # Log file path
  file: "/var/log/mcpwner/server.log"
